<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rune Index</title>

<link rel="stylesheet" href="/css/runestyle.css">

</head>

<body>

<div class="page-container">

    <!-- BACKGROUND IMAGE -->
    <img src="/assets/Cards/rune_index_background.png" class="page-bg" id="runeIndexBg">

    <!-- BUTTON LAYER: keeps original 1920px placement, then scales as one piece -->
    <div class="button-layer" id="buttonLayer">

        <!-- DISCIPLINE RUNES -->
        <div class="drawer-btn debug" style="top: 750px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 750px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 852px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 852px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 956px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 956px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1062px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1062px; left: 1478px;" onclick="openCard()"></div>

        <!-- ELEMENT RUNES -->
        <div class="drawer-btn debug" style="top: 1357px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1357px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1455px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1455px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1556px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1556px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1654px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1654px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1755px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 1755px; left: 1478px;" onclick="openCard()"></div>

        <!-- FOCUS RUNES -->
        <div class="drawer-btn debug" style="top: 2222px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 2222px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 2323px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 2323px; left: 1478px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 2424px; left: 643px;" onclick="openCard()"></div>
        <div class="drawer-btn debug" style="top: 2424px; left: 1478px;" onclick="openCard()"></div>

        <!-- RETURN TO ARCHIVE BUTTON -->
        <div class="drawer-btn archive-btn debug" style="top: 2650px; left: 175px;" onclick="openCard()"></div>

    </div>
</div>

<button id="openCard">Open Bás Card</button>

<div id="overlay"></div>

<div id="cardPanel">
    <div class="rune-card">

        <div class="rune-image">
            <img src="/assets/Runes/Aillie.png">
        </div>

        <div class="rune-content">
            <div class="rune-title">Bás</div>
            <div class="rune-subtitle">Death — The Necromancer’s Rune</div>
            <div class="rune-body">
                Bás allows a Manipulator to harness the power of death and unlife.
            </div>
        </div>

        <button id="closeCard">X</button>

    </div>
</div>

<script>
function syncButtonLayer() {
    const bg = document.getElementById("runeIndexBg");
    const layer = document.getElementById("buttonLayer");

    if (!bg || !layer) return;

    const designWidth = 1920;
    const scale = bg.clientWidth / designWidth;

    layer.style.transform = "scale(" + scale + ")";
}

window.addEventListener("load", syncButtonLayer);
window.addEventListener("resize", syncButtonLayer);

function openCard() {
    document.getElementById("cardPanel").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeCard() {
    document.getElementById("cardPanel").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

document.getElementById("closeCard").onclick = closeCard;
document.getElementById("overlay").onclick = closeCard;
document.getElementById("openCard").onclick = openCard;
</script>

</body>
</html>
